# =====================================================
# Projet GSB - Environnement de développement
# MySQL 8.0 + phpMyAdmin via Docker Compose
# =====================================================
# Usage :
#   docker compose up -d         # démarre les conteneurs
#   docker compose ps            # liste les conteneurs
#   docker compose logs -f mysql # suit les logs MySQL
#   docker compose down          # arrête (garde les données)
#   docker compose down -v       # arrête ET supprime les données
#
# Accès phpMyAdmin :  http://localhost:8080
# Identifiants     :  gsb / gsbpass   (compte applicatif)
#                     root / rootpassword  (compte administrateur)
#
# Connexion depuis l'application C# :
#   Server=localhost;Port=3306;Database=gsb_ordonnances;Uid=gsb;Pwd=gsbpass;
# =====================================================

services:

  mysql:
    image: mysql:8.0
    container_name: gsb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gsb_ordonnances
      MYSQL_USER: gsb
      MYSQL_PASSWORD: gsbpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Le script SQL est joué automatiquement a la premiere
      # initialisation du conteneur (dossier magique
      # /docker-entrypoint-initdb.d/).
      # Pour re-importer apres modification :
      #   docker compose down -v && docker compose up -d
      - ./gsb_ordonnances.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gsb-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
